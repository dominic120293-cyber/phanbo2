<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel Allocation Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        h1 { font-weight: 300; font-size: 28px; margin-bottom: 10px; color: #bb86fc; letter-spacing: 1px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; border-bottom: 1px solid #2c2c2c; padding-bottom: 20px; }
        .upload-area {
            background-color: #252525;
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 30px 20px;
            margin-bottom: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover { border-color: #bb86fc; background-color: #2a2a2a; }
        .upload-area label { display: block; font-size: 16px; color: #aaa; cursor: pointer; }
        .upload-area input[type="file"] { display: none; }
        .upload-area .file-name { margin-top: 12px; font-size: 14px; color: #bb86fc; word-break: break-all; }
        .btn {
            background-color: #bb86fc;
            border: none;
            color: #121212;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .btn:hover { background-color: #a06cd9; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 15px; min-height: 24px; }
        .status.loading { color: #ffb74d; }
        .status.success { color: #81c784; }
        .status.error { color: #e57373; }
        .footer { margin-top: 30px; font-size: 12px; color: #555; border-top: 1px solid #2c2c2c; padding-top: 20px; }
        .footer a { color: #888; text-decoration: none; }
        .footer a:hover { color: #bb86fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 VESSEL ALLOCATION</h1>
        <div class="subtitle">Optimizing Vessel Plan</div>

        <!-- Không dùng thẻ form truyền thống, xử lý bằng JS -->
        <div id="uploadArea">
            <div class="upload-area" id="dropArea">
                <label for="fileInput">📁 Chọn file Excel (1112.xlsx)</label>
                <input type="file" id="fileInput" accept=".xlsx" required>
                <div class="file-name" id="fileName">Chưa có file</div>
            </div>
            <button class="btn" id="runBtn">▶ Chạy</button>
        </div>

        <div class="status" id="status">Sẵn sàng</div>
        <div class="footer">
            <span>Powered by PuLP &amp; Flask</span>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const dropArea = document.getElementById('dropArea');
        const statusDiv = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');

        // Cập nhật tên file khi chọn
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileName.textContent = this.files[0].name;
                statusDiv.textContent = '✅ File đã chọn';
                statusDiv.className = 'status success';
            } else {
                fileName.textContent = 'Chưa có file';
                statusDiv.textContent = 'Sẵn sàng';
                statusDiv.className = 'status';
            }
        });

        // Kích hoạt click vào input file
        dropArea.addEventListener('click', function() {
            fileInput.click();
        });

        // Xử lý sự kiện nhấn nút Run
        runBtn.addEventListener('click', async function() {
            if (!fileInput.files.length) {
                statusDiv.textContent = '⚠️ Vui lòng chọn file trước';
                statusDiv.className = 'status error';
                return;
            }

            // Vô hiệu hóa nút, hiển thị đang xử lý
            runBtn.disabled = true;
            runBtn.textContent = '⏳ Đang xử lý...';
            statusDiv.textContent = '🔄 Đang chạy mô hình, vui lòng đợi...';
            statusDiv.className = 'status loading';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText || 'Lỗi server');
                }

                // Tải file
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Allocation_Result.xlsx';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                statusDiv.textContent = '✅ Tải file thành công!';
                statusDiv.className = 'status success';

                // (Tùy chọn) Reset toàn bộ: xóa file đã chọn
                // fileInput.value = '';
                // fileName.textContent = 'Chưa có file';
                // statusDiv.textContent = 'Sẵn sàng';
                // statusDiv.className = 'status';
            } catch (error) {
                statusDiv.textContent = '❌ ' + error.message;
                statusDiv.className = 'status error';
            } finally {
                // Khôi phục nút về trạng thái ban đầu
                runBtn.disabled = false;
                runBtn.textContent = '▶ Chạy';
            }
        });
    </script>
</body>
</html>
